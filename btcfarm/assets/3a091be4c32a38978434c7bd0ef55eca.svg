<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="516.51652" height="396.3964" viewBox="0,0,516.51652,396.3964"><defs><linearGradient x1="240.29193" y1="-5.20085" x2="240.29193" y2="391.19555" gradientUnits="userSpaceOnUse" id="color-1"><stop offset="0" stop-color="#12a300"/><stop offset="1" stop-color="#114f00"/></linearGradient></defs><g transform="translate(17.96633,5.20085)"><g data-paper-data="{&quot;isPaintingLayer&quot;:true}" fill-rule="nonzero" stroke="none" stroke-linecap="butt" stroke-linejoin="miter" stroke-miterlimit="10" stroke-dasharray="" stroke-dashoffset="0" style="mix-blend-mode: normal"><path d="M-17.96633,391.19555v-396.3964h516.51652v396.3964z" fill="url(#color-1)" stroke-width="0"/><text transform="translate(10.5622,59.36372) scale(1.41099,1.41099)" font-size="40" xml:space="preserve" fill="#000000" fill-rule="nonzero" stroke="none" stroke-width="1" stroke-linecap="butt" stroke-linejoin="miter" stroke-miterlimit="10" stroke-dasharray="" stroke-dashoffset="0" font-family="Sans Serif" font-weight="normal" text-anchor="start" style="mix-blend-mode: normal"><tspan x="0" dy="0">HELP</tspan></text><text transform="translate(1.48636,121.71788) scale(0.4816,0.4816)" font-size="40" xml:space="preserve" fill="#000000" fill-rule="nonzero" stroke="none" stroke-width="1" stroke-linecap="butt" stroke-linejoin="miter" stroke-miterlimit="10" stroke-dasharray="" stroke-dashoffset="0" font-family="Sans Serif" font-weight="normal" text-anchor="start" style="mix-blend-mode: normal"><tspan x="0" dy="0">In BTC Farm, your goal is to get as much money</tspan><tspan x="0" dy="46.150000000000006px">as possible and have the best bitcoin mining setup.</tspan></text><text transform="translate(6.48636,198.65623) scale(0.5,0.5)" font-size="40" xml:space="preserve" fill="#000000" fill-rule="nonzero" stroke="none" stroke-width="1" stroke-linecap="butt" stroke-linejoin="miter" stroke-miterlimit="10" stroke-dasharray="" stroke-dashoffset="0" font-family="Sans Serif" font-weight="normal" text-anchor="start" style="mix-blend-mode: normal"><tspan x="0" dy="0">When you start, you should buy a Power Supply.</tspan><tspan x="0" dy="46.150000000000006px">Power Supplies generate Watts, which are used</tspan><tspan x="0" dy="46.150000000000006px">by Graphics Cards to generate computing power,</tspan><tspan x="0" dy="46.150000000000006px">which is then used by processors to make </tspan><tspan x="0" dy="46.150000000000006px">BitCoin (the blue counter at the bottom).</tspan></text><text transform="translate(12.48636,346.35178) scale(0.5,0.5)" font-size="40" xml:space="preserve" fill="#000300" fill-rule="nonzero" stroke="none" stroke-width="1" stroke-linecap="butt" stroke-linejoin="miter" stroke-miterlimit="10" stroke-dasharray="" stroke-dashoffset="0" font-family="Sans Serif" font-weight="normal" text-anchor="start" style="mix-blend-mode: normal"><tspan x="0" dy="0">(Click to continue)</tspan></text></g></g></svg>